site_name: Longton IT Help Centre
site_description: IT guides and support resources for Longton staff
site_author: Longton IT Team
site_url: https://lt-it-kb.pages.dev

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
  icon:
    logo: material/lifebuoy

plugins:
  - search:
      lang: en

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Calendar & Meetings:
    - Share Your Calendar: calendar/share.md
  - Email & Outlook:
    - email/index.md
  - SharePoint & Files:
    - sharepoint/index.md
  - Microsoft Teams:
    - teams/index.md
  - Drivers:
    - Printer Drivers: drivers/index.md
  - FAQ:
    - general/faq.md

extra:
  social:
    - icon: fontawesome/solid/envelope
      link: mailto:support@longtonblackwell.com.au
      name: Contact IT Support

copyright: "&copy; 2026 Longton Blackwell — IT Help Centre"
